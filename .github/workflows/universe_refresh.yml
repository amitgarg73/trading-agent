name: Universe Refresh

on:
  schedule:
    - cron: '30 12 1 * *'   # 8:30 AM ET on the 1st of each month (12:30 UTC)
  workflow_dispatch:         # manual trigger any time

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh universe
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
        run: python orchestrator.py --mode universe_refresh

      - name: Commit updated S&P 500 fallback
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add config/sp500_tickers.json
          git diff --cached --quiet || git commit -m "chore: update S&P 500 fallback tickers [skip ci]"
          git push
