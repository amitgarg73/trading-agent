name: Trading Agent

on:
  schedule:
    # All times UTC (EDT = UTC-4)
    - cron: '0 14 * * 1-5'        # 10:00 AM ET — premarket scan (after spreads stabilize)
    - cron: '*/15 14-19 * * 1-5'        # Every 15 min 10:00-3:59 PM ET — intraday (entry cutoff 3:00 PM ET)
    - cron: '55 19 * * 1-5'             # 3:55 PM ET — EOD (before market close at 4:00 PM)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'premarket'
        type: choice
        options: [premarket, intraday, eod]
      broker:
        description: 'Broker'
        required: false
        default: 'alpaca'
        type: choice
        options: [alpaca, simulation]

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode and broker
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "broker=${{ github.event.inputs.broker || 'alpaca' }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            TIME=$((10#$HOUR * 60 + 10#$MIN))
            # Use windows, not exact minutes — GitHub scheduler can fire 5-15 min late
            # Premarket window: 14:00-14:29 UTC (10:00-10:29 AM ET) — 30 min buffer for late firing
            # EOD window:       19:55-23:59 UTC (3:55+ PM ET) — runs before 4 PM market close
            # Intraday:         everything else (including 14:30+ UTC = 10:30 AM ET onward)
            if [ $TIME -ge 840 ] && [ $TIME -lt 870 ]; then
              echo "mode=premarket" >> $GITHUB_OUTPUT
            elif [ $TIME -ge 1195 ]; then
              echo "mode=eod" >> $GITHUB_OUTPUT
            else
              echo "mode=intraday" >> $GITHUB_OUTPUT
            fi
            echo "broker=alpaca" >> $GITHUB_OUTPUT
          fi

      - name: Run agent
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          for attempt in 1 2 3; do
            echo "▶ Attempt $attempt of 3"
            python orchestrator.py --mode ${{ steps.mode.outputs.mode }} --broker ${{ steps.mode.outputs.broker }} && break
            if [ $attempt -lt 3 ]; then
              echo "  ⚠️ Attempt $attempt failed — retrying in 60s..."
              sleep 60
            else
              echo "  ❌ All 3 attempts failed"
              exit 1
            fi
          done

      - name: Run eval (EOD only)
        if: steps.mode.outputs.mode == 'eod'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python eval.py --days 30 --write

      - name: Notify on failure
        if: failure()
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:        amit.thirdeyetrading@gmail.com
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
        run: |
          python - <<'PY'
          import os, smtplib
          from email.mime.text import MIMEText
          mode = "${{ steps.mode.outputs.mode }}"
          repo = "${{ github.repository }}"
          run  = "${{ github.run_id }}"
          url  = f"https://github.com/{repo}/actions/runs/{run}"
          msg  = MIMEText(f"Strategy A {mode} workflow FAILED.\n\nLogs: {url}")
          msg["Subject"] = f"[Strategy A] {mode} FAILED"
          msg["From"]    = os.environ["GMAIL_USER"]
          msg["To"]      = os.environ["ALERT_EMAIL"]
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
              s.send_message(msg)
          print("Failure alert sent.")
          PY
