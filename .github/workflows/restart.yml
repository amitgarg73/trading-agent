name: Restart Trading Agent

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Clear halt flag
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python control.py --action restart

      - name: Confirm
        run: |
          echo "✅ Halt flag cleared. Trading agent will resume on the next scheduled run."
          echo "   Next premarket: 9:45 AM ET on the next trading day."
          echo "   To trigger immediately: use the 'Trading Agent' workflow_dispatch with mode=premarket."
